<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSDN Controller Simulator</title>
    <meta name="description"
        content="ConfT - Simulateur de contrôleur SDN avec visualisation de topologie réseau dynamique">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="header">
            <h1>WebSDN Controller</h1>
            <p>Simulation OpenFlow / Topologie Dynamique</p>
        </div>

        <div class="control-panel">
            <h3>1. Infrastructure (Nodes)</h3>
            <div class="control-group">
                <button id="refresh-topology-btn" class="btn-refresh">Recharger la topologie (API)</button>
                <!--
                refetch network
                fetch selected node
                
                -->

            </div>


            <div class="control-group">
                <div id="selected-node-info"></div>
            </div>

            <h3>demo</h3>
            <div class="control-group">
                <button onclick="app.generateRandomTopology()">Générer Topo Aléatoire</button>
            </div>


            <div class="terminal" id="console-log">
                <div>> Initialisation du contrôleur </div>
                
            </div>
        </div>
    </div>
    <!-- Main Graph Area -->
    <div class="main-view">
        <div id="graph-container"></div>


        <!-- Top Right Controls -->
        <div class="top-controls">
            <button id="lock-topology-btn" class="btn-lock">Déverrouiller le graphe</button>
            <div class="top-filter">
                <label for="vlan-filter">Filtrer par VLAN:</label>
                <select id="vlan-filter">
                    <option value="">Tous les VLANs</option>
                </select>
            </div>
            
        </div>

        <div id="tooltip" class="tooltip"></div>
        
        <!-- Bottom Panel for Interfaces -->
        <div id="bottom-panel" class="bottom-panel">
            <div class="panel-header">
                <h3 id="panel-title">Interfaces</h3>
                <button id="close-panel-btn" class="close-btn" onclick="app.closePanel()">×</button>
            </div>
            <div class="panel-content" id="interfaces-list">
                <!-- Interface cards will be generated here -->
            </div>
        </div>
    </div>

    <script src="main.js?v=2"></script>
</body>

</html>
