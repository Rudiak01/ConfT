<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSDN Controller Simulator</title>
    <meta name="description"
        content="ConfT - Simulateur de contrôleur SDN avec visualisation de topologie réseau dynamique">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="header">
            <h1>WebSDN Controller</h1>
            <p>Simulation OpenFlow / Topologie Dynamique</p>
        </div>

        <div class="control-panel">
            <h3>1. Infrastructure (Nodes)</h3>
            <div class="control-group">
                <button id="refresh-topology-btn" class="btn-refresh">Recharger la topologie (API)</button>
                <!--
                refetch network
                fetch selected node
                
                -->

            </div>


            <div class="control-group">
                <button onclick="app.fetchSelectedNode()">Afficher les interfaces de la node sélectionnée</button>
                <div id="selected-node-info"></div>
            </div>

            <h3>demo</h3>
            <div class="control-group">
                <button onclick="app.generateRandomTopology()">Générer Topo Aléatoire</button>
            </div>


            <div class="terminal" id="console-log">
                <div>> Initialisation du contrôleur SDN...</div>
                <div>> Connecté à l'interface REST API (8080)</div>
            </div>
        </div>
    </div>
    <!-- Main Graph Area -->
    <div class="main-view">
        <div id="graph-container"></div>

        <div class="legend">
            <div class="legend-item">
                <div class="dot" style="background:var(--switch-color)"></div> Switch (Controller)
            </div>
            <div class="legend-item">
                <div class="dot" style="background:var(--host-color)"></div> Hôte (End Device)
            </div>
        </div>

        <div id="tooltip" class="tooltip"></div>
    </div>

    <script src="main.js"></script>
</body>

</html>
